name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
jobs:
  validate-marketplace:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - run: pip install check-jsonschema==0.31.3
      - name: Validate marketplace.json
        run: check-jsonschema --schemafile .github/schemas/marketplace.schema.json .claude-plugin/marketplace.json
  validate-plugins:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - run: pip install check-jsonschema==0.31.3
      - name: Validate plugin.json files
        run: check-jsonschema --schemafile .github/schemas/plugin.schema.json plugins/*/.claude-plugin/plugin.json
      - name: Validate .mcp.json files
        run: check-jsonschema --schemafile .github/schemas/mcp.schema.json plugins/*/.mcp.json
      - name: Check no unpinned versions in .mcp.json
        run: .github/scripts/check-pinned-versions.sh
      - name: Check each plugin listed in marketplace has a directory
        run: .github/scripts/check-plugin-dirs.sh
      - name: Check plugin.json versions match marketplace entries
        run: .github/scripts/check-version-sync.sh
  check-duplicates:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Check for duplicate plugin names
        run: .github/scripts/check-duplicate-names.sh
  release:
    needs: [validate-marketplace, validate-plugins, check-duplicates]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    timeout-minutes: 15
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Create Release PR
        id: release
        uses: googleapis/release-please-action@v5
        with:
          manifest-file: .github/config/release-please-manifest.json
          config-file: .github/config/release-please-config.json
          target-branch: main
