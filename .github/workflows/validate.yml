name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-marketplace:
    name: Validate Marketplace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate marketplace.json
        uses: python-jsonschema/check-jsonschema@0.31.3
        with:
          schemafile: .github/schemas/marketplace.schema.json
          instancefiles: .claude-plugin/marketplace.json

  validate-plugins:
    name: Validate Plugins
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate plugin.json files
        uses: python-jsonschema/check-jsonschema@0.31.3
        with:
          schemafile: .github/schemas/plugin.schema.json
          instancefiles: plugins/*/.claude-plugin/plugin.json

      - name: Check each plugin listed in marketplace has a directory
        run: |
          error=0
          while IFS= read -r source; do
            path="${source#./}"
            if [ ! -d "$path" ]; then
              echo "✗ Missing directory for plugin source: $source"
              error=1
            else
              echo "✓ $source"
            fi
          done < <(jq -r '.plugins[].source' .claude-plugin/marketplace.json)
          exit $error

  check-duplicates:
    name: Check Duplicate Plugin Names
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check for duplicate plugin names
        run: |
          duplicates=$(jq -r '.plugins[].name' .claude-plugin/marketplace.json | sort | uniq -d)
          if [ -n "$duplicates" ]; then
            echo "✗ Duplicate plugin names: $duplicates"
            exit 1
          fi
          echo "✓ No duplicate plugin names"
